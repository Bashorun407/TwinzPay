server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Route to the User Service
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/users/**

        # Route to the Payment Service
        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - AuthenticationFilter

        # Route to the Utility Service
        - id: utility-service
          uri: lb://UTILITY-SERVICE
          predicates:
            - Path=/api/v1/utilities/**
          filters:
            - AuthenticationFilter

        # Route to the Scheduler Service:
        - id: scheduler-service
          uri: lb://SCHEDULER-SERVICE
          predicates:
            - Path=/api/v1/schedules/**
          filters:
            - AuthenticationFilter
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


jwt:
