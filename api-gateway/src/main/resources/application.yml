springdoc:
  swagger-ui:
    # This enables the top-right dropdown selector menu
    urls:
      - name: 1. User Service
        url: /api/v1/users/v3/api-docs
      - name: 2. Payment Service
        url: /api/v1/payments/v3/api-docs
      - name: 3. Utility Catalog Service
        url: /api/v1/utilities/v3/api-docs
      - name: 4. Scheduler Automation Service
        url: /api/v1/schedules/v3/api-docs