version: '3.8'

services:
  # 1. Database Container (Hosts multiple isolated schemas)
  mysql-db:
    image: mysql:8.0
    container_name: twinzpay-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root <-- This sets the password for the DOCKER database
    ports:
      - "3307:3306"
    networks:
      - twinzpay-network

  # 2. Service Registry
  eureka-server:
    build:
      context: ./discovery-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - twinzpay-network

  # 3. API Gateway
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - twinzpay-network

  # 4. User Service (Isolated DB: user_db)
  user-service:
    build:
      context: ./user-service
    container_name: user-service
    restart: on-failure
    ports:
      - "8081:8081" # Adjust this port if your user service uses a different one
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/user_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - mysql-db
      - eureka-server
    networks:
      - twinzpay-network

  # 5. Payment Service (Isolated DB: payment_db)
  payment-service:
    build:
      context: ./payment-service
    container_name: payment-service
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/payment_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - mysql-db
      - eureka-server
    networks:
      - twinzpay-network

  # 6. Scheduler Service (Isolated DB: scheduler_db)
  scheduler-service:
    build:
      context: ./scheduler-service
    container_name: scheduler-service
    restart: on-failure
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/scheduler_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - mysql-db
      - eureka-server
      - payment-service
    networks:
      - twinzpay-network

  # 7. Utility Service (Isolated DB: utility_db)
  utility-service:
    build:
      context: ./utility-service
    container_name: utility-service
    restart: on-failure
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/utility_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - mysql-db
      - eureka-server
    networks:
      - twinzpay-network

networks:
  twinzpay-network:
    driver: bridge