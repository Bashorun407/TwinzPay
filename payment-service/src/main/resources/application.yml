server:
  port: 8082

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://localhost:3306/twinzpay_payment_db
    username: root # Your MySQL username
    password: password # Your MySQL password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Custom properties for Paystack integration
paystack:
  secret-key: sk_test_your_paystack_test_key_here # Replace with your actual test key later
  base-url: https://api.paystack.co