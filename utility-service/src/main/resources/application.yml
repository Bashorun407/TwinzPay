server:
  port: 8084

spring:
  application:
    name: utility-service
  datasource:
    url: jdbc:mysql://localhost:3306/twinzpay_utility_db
    username: root # Change to your local MySQL username
    password: 1234qwer # Change to your local MySQL password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Add this at the root level of your file
springdoc:
  api-docs:
    path: /api/v1/utilities/v3/api-docs